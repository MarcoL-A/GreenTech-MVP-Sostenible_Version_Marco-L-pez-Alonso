<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Landing page sostenible de GreenTech" />
    <title>Salvemos el Planeta - GreenTech</title>
    <style>
      /* Uso de variables CSS nativas (:root), evitando usar preprocesadores pesados. */
      :root {
        --primary-green: #28a745;
        --dark-green: #1e7e34;
        --bg-light: #f4fdf4;
        --text-white: #ffffff;
      }
      /* Añado fuentes de respaldo (system-ui, sans-serif) por si falla la red, así el sistema no tiene que hacer un esfuerzo extra buscando fuentes inexistentes. */
      body {
        font-family: "Montserrat", system-ui, sans-serif;
        background-color: var(--bg-light);
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .hero-section {
        position: relative;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        color: var(--text-white);
        overflow: hidden;
      }
      /* La imagen ya no necesita de un CSS, sino una etiqueta <img> en HTML. */
      .hero-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover;
        z-index: -1;
        filter: brightness(0.6); /* Sustituye al costoso text-shadow que también consume mucha batería del movil. */
      }
      /* La función clamp() ajusta el tamaño del texto según la pantalla automáticamente (mínimo, ideal y máximo). */
      h1 {
        font-size: clamp(2.5rem, 6vw, 5rem);
        font-weight: 700;
        margin: 0;
      }
      .btn-eco {
        background-color: var(--primary-green);
        color: var(--text-white);
        border: 2px solid var(--dark-green);
        padding: 15px 40px;
        font-size: 1.5rem;
        font-family: inherit;
        font-weight: 700;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 2rem;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: background-color 0.3s ease;
      }
      .btn-eco:hover {
        background-color: var(--dark-green);
      }
      /* SVG Inline: Elimina la necesidad de cargar los 30MB de FontAwesome */
      .icon-leaf {
        width: 24px;
        height: 24px;
        fill: currentColor;
      }
      footer {
        background-color: #212529;
        color: var(--text-white);
        text-align: center;
        padding: 1rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main class="hero-section">
      <img 
        src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=60&w=1200&fm=webp&auto=format"
        class="hero-bg" 
        loading="lazy" 
      />
      <h1>Salvemos el Planeta</h1>
      <p class="lead">Únete a la revolución verde de GreenTech.</p>
      <button class="btn-eco">
        Quiero ayudar
      </button>
    </main>
  </body>
  <footer>GreenTech Solutions © 2026 - Haciendo un mundo mejor (y respetando tu hardware)</footer>
</html>
